name: Chromatic — Storybook deploy

# Trigger : à chaque push sur n'importe quelle branche + PR
# Le déploiement remplace l'URL Chromatic publique à chaque main push.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  chromatic:
    name: Build + publish Storybook to Chromatic
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Chromatic to detect baselines

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Use npm install (not npm ci) to be tolerant of package-lock.json desyncs
        # — Claude Code can add devDeps to package.json but cannot regenerate the lock
        # file in its sandbox. npm install resolves and updates the lock as needed.
        run: npm install

      - name: Publish to Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true  # Don't fail the workflow on visual changes
          autoAcceptChanges: main   # Auto-accept baseline on main branch
