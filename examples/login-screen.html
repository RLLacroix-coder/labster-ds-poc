<!--
  Login Screen — Labster DS POC (étape 9)
  Date : 2026-05-22

  Protocole ARC (Compose) appliqué AVANT génération :
    1. Chargé .ai/index.json -> Components disponibles : Button, Input, Dialog (3 atoms+1 molecule)
    2. Chargé .ai/design-tokens.json -> 19 colors, 5 typo, 3 elevation, 4 radius
    3. Chargé components/Button.design.md + Input.design.md
    4. Chargé DESIGN.md global pour tokens spacing/typography

  Composants Labster DS utilisés :
    - Input  (variant=size-default, state=default)        -> Email field
    - Input  (variant=size-default, state=default, type=password) -> Password field
    - Button (variant=primary, type=submit)               -> Sign in
    - Button (variant=link)                               -> Forgot password ?

  Tokens Labster DS consommés (référence DTCG) :
    - colors.neutral.smoke    -> body background (page surface)
    - colors.neutral.white    -> form container background, input field bg
    - colors.neutral.grey-1   -> form container border
    - colors.neutral.grey-2   -> input border, focused border base
    - colors.neutral.grey-3   -> placeholder text
    - colors.neutral.grey-6   -> input value, title, label
    - colors.semantic.action-primary       -> Sign in button bg + focus ring + link text
    - colors.semantic.action-primary-hover -> Sign in button hover bg
    - typography.body-medium  -> button label, input label
    - typography.p-ui         -> input value/placeholder (size=default)
    - typography.subtle       -> helper text
    - typography.title-large  -> page title
    - shapes.radius.sm        -> button + input radius
    - shapes.radius.md        -> form container radius
    - elevation.medium        -> form container shadow

  Garde-fous respectés :
    - Aucun hex hardcodé : tous via CSS custom property
    - Aucun composant absent du DS utilisé (les éléments hors DS sont des div natives stylées via tokens, pas des "composants")
    - Pas de variant inventé : Input state=error PRÉVU dans le DESIGN.md (pour validation client-side ultérieure), mais pas rendu ici (état initial)

  Limites assumées de cette générat :
    - Stack-agnostique HTML/CSS, pas Angular/React (objectif POC stack-agnostique)
    - Pas de validation JS (le focus est sur le rendu DS-aware, pas le comportement)
    - i18n : copy en anglais conforme à la voice Labster
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Labster</title>

  <!-- Barlow font (Labster primary family) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* =====================================================================
       LABSTER DS TOKENS (extracted from .ai/design-tokens.json)
       ===================================================================== */
    :root {
      /* Colors — neutral */
      --color-neutral-white: #ffffff;
      --color-neutral-smoke: #f5f6f8;
      --color-neutral-grey-1: #e3e5e8;
      --color-neutral-grey-2: #a9b2bc;
      --color-neutral-grey-3: #707f8f;
      --color-neutral-grey-4: #465b72;
      --color-neutral-grey-5: #273c53;
      --color-neutral-grey-6: #0e2946;

      /* Colors — semantic */
      --color-semantic-action-primary: #476ae3;
      --color-semantic-action-primary-hover: #3a57bc;
      --color-semantic-danger: #ef4c59;
      --color-semantic-danger-hover: #e04854;

      /* Typography — family */
      --font-family-primary: "Barlow", system-ui, -apple-system, sans-serif;

      /* Typography — style aliases */
      --font-title-large: 600 18px/28px var(--font-family-primary);
      --font-body-medium: 500 14px/24px var(--font-family-primary);
      --font-p-ui: 400 16px/24px var(--font-family-primary);
      --font-subtle: 400 14px/20px var(--font-family-primary);

      /* Shapes — radius */
      --radius-sm: 6px;
      --radius-md: 8px;

      /* Elevation */
      --elevation-medium: 0 4px 16px 0 rgba(0, 46, 70, 0.1);
      --elevation-large: 0 8px 24px 0 rgba(0, 46, 70, 0.1);

      /* Spacing — provisional scale (cf. DESIGN.md global, layout section incomplete) */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
    }

    /* =====================================================================
       BASE RESET
       ===================================================================== */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-family-primary);
      color: var(--color-neutral-grey-6);
      background-color: var(--color-neutral-smoke);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--space-4);
    }

    /* =====================================================================
       FORM CONTAINER (not a DS component — bare div styled with tokens)
       ===================================================================== */
    .login-card {
      width: 100%;
      max-width: 425px;
      background-color: var(--color-neutral-white);
      border: 1px solid var(--color-neutral-grey-1);
      border-radius: var(--radius-md);
      box-shadow: var(--elevation-medium);
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    /* Logo placeholder — text-based "LABSTER" until image asset is provided */
    .login-card__logo {
      font: 700 20px/24px var(--font-family-primary);
      color: var(--color-semantic-action-primary);
      letter-spacing: 1px;
    }

    .login-card__title {
      font: var(--font-title-large);
      color: var(--color-neutral-grey-6);
      margin: 0;
    }

    .login-card__description {
      font: var(--font-subtle);
      color: var(--color-neutral-grey-3);
      margin: 0;
    }

    /* =====================================================================
       DS COMPONENT — INPUT (variant=size-default, state=default)
       Re-implements components/Input.design.md tokens
       ===================================================================== */
    .ds-input {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .ds-input__label {
      font: var(--font-body-medium);
      color: var(--color-neutral-grey-6);
    }

    .ds-input__field {
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background-color: var(--color-neutral-white);
      border: 1px solid var(--color-neutral-grey-2);
      border-radius: var(--radius-sm);
      font: var(--font-p-ui);
      color: var(--color-neutral-grey-6);
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .ds-input__field::placeholder {
      color: var(--color-neutral-grey-3);
    }

    /* Focused state — outer ring 2px semantic.action-primary (Labster upgrade vs Shadcn grey) */
    .ds-input__field:focus-visible {
      border-color: var(--color-neutral-grey-2);
      box-shadow: 0 0 0 2px var(--color-semantic-action-primary);
    }

    .ds-input__helper {
      font: var(--font-subtle);
      color: var(--color-neutral-grey-3);
    }

    /* =====================================================================
       DS COMPONENT — BUTTON (variant=primary)
       Re-implements components/Button.design.md tokens
       ===================================================================== */
    .ds-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-sm);
      font: var(--font-body-medium);
      cursor: pointer;
      border: none;
      transition: background-color 120ms ease, color 120ms ease;
      width: 100%;
    }

    .ds-button:focus-visible {
      outline: 2px solid var(--color-semantic-action-primary);
      outline-offset: 2px;
    }

    .ds-button--primary {
      background-color: var(--color-semantic-action-primary);
      color: var(--color-neutral-white);
    }

    .ds-button--primary:hover {
      background-color: var(--color-semantic-action-primary-hover);
    }

    .ds-button--primary:disabled {
      background-color: var(--color-neutral-grey-2);
      cursor: not-allowed;
    }

    /* =====================================================================
       DS COMPONENT — BUTTON (variant=link)
       ===================================================================== */
    .ds-button--link {
      background-color: transparent;
      color: var(--color-semantic-action-primary);
      padding: 0;
      width: auto;
      text-decoration: none;
    }

    .ds-button--link:hover {
      text-decoration: underline;
    }

    /* =====================================================================
       LAYOUT — Footer link aligned center
       ===================================================================== */
    .login-card__footer {
      text-align: center;
      font: var(--font-subtle);
      color: var(--color-neutral-grey-3);
    }
  </style>
</head>

<body>
  <main class="login-card" aria-labelledby="login-title">
    <!-- Logo placeholder. À remplacer par <img src="logo-labster.svg" alt="Labster"> en production -->
    <div class="login-card__logo">LABSTER</div>

    <div>
      <h1 id="login-title" class="login-card__title">Sign in to Labster</h1>
      <p class="login-card__description">Enter your credentials to access your workspace.</p>
    </div>

    <form action="#" method="post" novalidate>
      <!-- DS Input (variant=size-default) — Email -->
      <div class="ds-input">
        <label class="ds-input__label" for="email">Email</label>
        <input
          class="ds-input__field"
          id="email"
          name="email"
          type="email"
          placeholder="name@example.com"
          autocomplete="email"
          required
          aria-describedby="email-helper"
        />
        <span class="ds-input__helper" id="email-helper">We will send your sign-in link to this address.</span>
      </div>

      <div style="height: var(--space-4);"></div>

      <!-- DS Input (variant=size-default, type=password) — Password -->
      <div class="ds-input">
        <label class="ds-input__label" for="password">Password</label>
        <input
          class="ds-input__field"
          id="password"
          name="password"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
          aria-describedby="password-helper"
        />
        <span class="ds-input__helper" id="password-helper">Minimum 8 characters.</span>
      </div>

      <div style="height: var(--space-6);"></div>

      <!-- DS Button (variant=primary) — Sign in -->
      <button class="ds-button ds-button--primary" type="submit">Sign in</button>
    </form>

    <!-- DS Button (variant=link) — Forgot password -->
    <div class="login-card__footer">
      <a class="ds-button ds-button--link" href="#forgot-password">Forgot your password?</a>
    </div>
  </main>
</body>
</html>
